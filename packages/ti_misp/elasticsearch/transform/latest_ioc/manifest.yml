start: true
destination_index_template:
  settings:
    index:
      sort:
        field:
          - "@timestamp"
        order:
          - desc
  mappings:
    dynamic: true
    dynamic_templates:
      - strings_as_keyword:
          match_mapping_type: string
          mapping:
            ignore_above: 1024
            type: keyword
      # - _embedded_ecs-threat_indicator_ip:
      #     mapping:
      #       ignore_malformed: true
      #       type: ip
      #     path_match: threat.indicator.ip
    date_detection: false
